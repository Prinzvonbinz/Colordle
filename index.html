<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Colordle 7-Farben Dark Mode</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  body {
    font-family: sans-serif;
    margin: 0;
    padding: 0;
    background-color: #121212;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }
  h1 { margin-top: 20px; text-align: center; }
  #colorChart { margin-top: 20px; max-width: 90vw; max-height: 40vh; }
  #selected-colors {
    margin: 20px 0;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
  }
  .color-slot {
    width: 40px;
    height: 40px;
    border: 2px solid #fff;
    margin: 5px;
    border-radius: 6px;
    background-color: #222;
    cursor: pointer;
  }
  #color-buttons {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 95vw;
    margin-bottom: 20px;
  }
  #color-buttons button {
    width: 40px;
    height: 40px;
    margin: 4px;
    border: 2px solid transparent;
    border-radius: 6px;
    cursor: pointer;
  }
  #submit {
    padding: 12px 25px;
    margin-bottom: 20px;
    background-color: #1f1f1f;
    border: 2px solid #fff;
    color: #fff;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
  }
  #submit:active { transform: scale(0.95); }
  #win-screen {
    display: none;
    text-align: center;
  }
  #win-screen button {
    margin-top: 10px;
    padding: 10px 20px;
    border-radius: 6px;
    border: none;
    background-color: #ff9800;
    color: #000;
    font-weight: bold;
    cursor: pointer;
  }
</style>
</head>
<body>

<h1>Colordle 7-Farben</h1>
<canvas id="colorChart"></canvas>

<div id="selected-colors">
  <div class="color-slot" id="slot0"></div>
  <div class="color-slot" id="slot1"></div>
  <div class="color-slot" id="slot2"></div>
  <div class="color-slot" id="slot3"></div>
  <div class="color-slot" id="slot4"></div>
  <div class="color-slot" id="slot5"></div>
  <div class="color-slot" id="slot6"></div>
</div>

<div id="color-buttons"></div>
<button id="submit">Submit</button>

<div id="win-screen">
  <h2>🎉 Du hast gewonnen!</h2>
  <p id="stats"></p>
  <button onclick="restartGame()">Neustart</button>
</div>

<script>
const colors = ['red','blue','yellow','green','orange','purple','pink','cyan','magenta','brown','lime','teal','navy','gray','black'];
const endColor = [];
const playerChoice = [];
let attempts = 0;
const maxSlots = 7;

// zufällige Endfarbe erstellen
for(let i=0; i<maxSlots; i++){
  endColor.push(colors[Math.floor(Math.random()*colors.length)]);
}

// Zähle Farben
function countColors(arr){
  const counts = {};
  arr.forEach(c=>counts[c]=(counts[c]||0)+1);
  return counts;
}

// Kreisdiagramm
const ctx = document.getElementById('colorChart').getContext('2d');
const chartData = {
  labels: colors,
  datasets: [{
    data: colors.map(c => endColor.filter(ec=>ec===c).length),
    backgroundColor: colors.map(c=>'#333'),
    borderWidth: 1
  }]
};
const colorChart = new Chart(ctx, {
  type: 'doughnut',
  data: chartData,
  options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false } } }
});

// Farb-Buttons
const buttonsDiv = document.getElementById('color-buttons');
const buttonsMap = {};
colors.forEach(c=>{
  const btn = document.createElement('button');
  btn.style.backgroundColor = c;
  btn.onclick = ()=>addColor(c);
  buttonsDiv.appendChild(btn);
  buttonsMap[c] = btn;
});

// Farbe hinzufügen
function addColor(c){
  if(playerChoice.length >= maxSlots) return;
  playerChoice.push(c);
  document.getElementById('slot'+(playerChoice.length-1)).style.backgroundColor = c;
  updateButtonFrames();
}

// Slot entfernen
for(let i=0;i<maxSlots;i++){
  document.getElementById('slot'+i).onclick = ()=>{
    if(playerChoice[i]){
      playerChoice.splice(i,1);
      refreshSlots();
      updateButtonFrames();
    }
  }
}

// Slots aktualisieren
function refreshSlots(){
  for(let i=0;i<maxSlots;i++){
    document.getElementById('slot'+i).style.backgroundColor = playerChoice[i] || '#222';
  }
}

// Buttons gold einrahmen, wenn richtig aber falscher Anteil
function updateButtonFrames(){
  const endCounts = countColors(endColor);
  const playerCounts = countColors(playerChoice);
  colors.forEach(c=>{
    const btn = buttonsMap[c];
    if(playerCounts[c] && playerCounts[c] !== endCounts[c] && endCounts[c]){
      btn.style.border = '2px solid gold';
    } else {
      btn.style.border = '2px solid transparent';
    }
  });
}

document.getElementById('submit').onclick = ()=>{
  if(playerChoice.length !== maxSlots) { alert('Bitte alle 7 Farben auswählen!'); return; }
  attempts++;
  const endCounts = countColors(endColor);
  const playerCounts = countColors(playerChoice);
  let win = true;
  colors.forEach((c,i)=>{
    if(playerCounts[c] === endCounts[c]) chartData.datasets[0].backgroundColor[i] = c;
    else win = false;
  });
  colorChart.update();

  // Slots zurücksetzen
  playerChoice.length = 0;
  refreshSlots();
  updateButtonFrames();

  if(win){
    document.getElementById('win-screen').style.display = 'block';
    document.getElementById('stats').innerText = `Versuche: ${attempts}`;
  }
}

function restartGame(){
  location.reload();
}
</script>

</body>
</html>
